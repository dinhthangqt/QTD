<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ thống Biểu quyết ĐH</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 10px;
            color: #333;
        }
        .container { max-width: 500px; margin: auto; }
        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            margin-bottom: 15px; 
        }
        h2 { margin-top: 0; font-size: 1.2rem; color: #1a73e8; }
        
        /* === FRAME CAMERA GIỮ NGUYÊN NHỎ GỌN (1/3) === */
        #reader { 
            width: 60%; 
            max-width: 200px; 
            margin: 10px auto; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000;
            border: 2px solid #1a73e8;
            aspect-ratio: 1.0;
        }

        .qr-status { 
            display: block; 
            margin: 15px 0; 
            font-weight: bold; 
            color: #d32f2f;
            text-align: center;
            font-size: 1.1rem;
            min-height: 1.5em;
        }

        .candidate-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .candidate-item:last-child { border-bottom: none; }
        .name { font-weight: bold; display: block; margin-bottom: 8px; color: #333; }
        
        .btn-group { display: flex; gap: 8px; }
        .opt-btn { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            background: #fff; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 0.95em;
        }
        .opt-btn.active-y { background: #2e7d32 !important; color: white !important; border-color: #2e7d32; }
        .opt-btn.active-n { background: #c62828 !important; color: white !important; border-color: #c62828; }
        
        #btn-scan { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            cursor: pointer;
            font-size: 1em;
        }
        #btn-save { 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.2em; 
            margin-top: 20px; 
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(40,167,69,0.3);
        }
        #btn-save:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        .footer-note { font-size: 0.8rem; color: #777; margin-top: 10px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <button id="btn-scan" onclick="startCamera()">BẬT CAMERA QUÉT MÃ</button>
        <div id="reader"></div>
        <span id="qr-status" class="qr-status">Chờ quét mã QR trên phiếu...</span>
    </div>

    <div class="card">
        <div class="candidate-item">
            <span class="name">1. Trần Thị Hải Vân</span>
            <div class="btn-group">
                <button id="uv1-y" class="opt-btn active-y" onclick="selectChoice('uv1','Đồng ý')">Đồng ý</button>
                <button id="uv1-n" class="opt-btn" onclick="selectChoice('uv1','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">2. Nguyễn Văn Minh</span>
            <div class="btn-group">
                <button id="uv2-y" class="opt-btn active-y" onclick="selectChoice('uv2','Đồng ý')">Đồng ý</button>
                <button id="uv2-n" class="opt-btn" onclick="selectChoice('uv2','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">3. Nguyễn Thị Hải Hiền</span>
            <div class="btn-group">
                <button id="uv3-y" class="opt-btn active-y" onclick="selectChoice('uv3','Đồng ý')">Đồng ý</button>
                <button id="uv3-n" class="opt-btn" onclick="selectChoice('uv3','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <button id="btn-save" onclick="submitToGoogle()">LƯU PHIẾU BẦU</button>
        
        <div class="footer-note">
            * Lưu ý: Nếu gặp lỗi Camera, hãy bấm vào 3 chấm góc trên bên phải màn hình và chọn <b>"Mở bằng trình duyệt" (Chrome/Safari)</b>.
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhb-zc0UHw82Tayt-CpxyU69oUykvlopc8_7jrwcbY5nD9mzpDJIIrFQSndy1BCoMDoQ/exec";
    
    let formData = { 
        qr: "", 
        uv1: "Đồng ý", 
        uv2: "Đồng ý", 
        uv3: "Đồng ý" 
    };

    let html5QrCode;

    async function startCamera() {
        const scanBtn = document.getElementById('btn-scan');
        scanBtn.innerText = "🔄 Đang khởi động...";
        
        try {
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { 
                    fps: 15, 
                    // === KHUNG NHẬN DIỆN TO HƠN (Gần bằng kích thước Frame) ===
                    // Chỉnh lên 180 hoặc 190 để chiếm gần hết diện tích ô đen 200px
                    qrbox: { width: 185, height: 185 } 
                },
                (qrText) => {
                    if (formData.qr !== qrText) {
                        formData.qr = qrText;
                        const status = document.getElementById('qr-status');
                        status.innerText = "✅ ĐÃ QUÉT: " + qrText;
                        status.style.color = "#2e7d32";
                        if (navigator.vibrate) navigator.vibrate(100); 
                    }
                }
            );
            scanBtn.style.display = 'none';
        } catch (err) {
            alert("Lỗi Camera: " + err);
            scanBtn.innerText = "THỬ LẠI";
        }
    }

    function selectChoice(uv, val) {
        formData[uv] = val;
        const isYes = (val === 'Đồng ý');
        document.getElementById(uv + '-y').className = isYes ? 'opt-btn active-y' : 'opt-btn';
        document.getElementById(uv + '-n').className = isYes ? 'opt-btn' : 'opt-btn active-n';
    }

    function submitToGoogle() {
        if(!formData.qr) {
            alert("⚠️ Bạn chưa quét mã QR trên phiếu!");
            return;
        }
        
        const btn = document.getElementById('btn-save');
        btn.innerText = "⏳ ĐANG LƯU DỮ LIỆU...";
        btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert("🎉 Đã lưu phiếu bầu thành công!");
            formData.qr = "";
            document.getElementById('qr-status').innerText = "Sẵn sàng quét phiếu mới...";
            document.getElementById('qr-status').style.color = "#d32f2f";
            btn.innerText = "LƯU PHIẾU BẦU";
            btn.disabled = false;
        })
        .catch(err => {
            alert("Lỗi kết nối: " + err);
            btn.innerText = "THỬ LẠI";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
