<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ thống Biểu quyết ĐH</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
        .qr-status { display: block; margin: 10px 0; font-weight: bold; color: #d32f2f; }
        
        .candidate-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .candidate-item:last-child { border-bottom: none; }
        .name { font-weight: bold; display: block; margin-bottom: 8px; color: #333; }
        
        .btn-group { display: flex; gap: 8px; }
        .opt-btn { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .opt-btn.active-y { background: #2e7d32; color: white; border-color: #2e7d32; }
        .opt-btn.active-n { background: #c62828; color: white; border-color: #c62828; }
        
        #btn-scan { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
        #btn-save { background: #28a745; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1.1em; margin-top: 10px; }
        #btn-save:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <button id="btn-scan" onclick="startCamera()">MỞ CAMERA QUÉT PHIẾU</button>
        <div id="reader"></div>
        <span id="qr-status" class="qr-status">Chưa quét mã phiếu</span>
    </div>

    <div class="card">
        <div class="candidate-item">
            <span class="name">1. Trần Thị Hải Vân</span>
            <div class="btn-group">
                <button id="uv1-y" class="opt-btn active-y" onclick="select('uv1','Đồng ý')">Đồng ý</button>
                <button id="uv1-n" class="opt-btn" onclick="select('uv1','Không')">Không</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">2. Nguyễn Văn Minh</span>
            <div class="btn-group">
                <button id="uv2-y" class="opt-btn active-y" onclick="select('uv2','Đồng ý')">Đồng ý</button>
                <button id="uv2-n" class="opt-btn" onclick="select('uv2','Không')">Không</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">3. Nguyễn Thị Hải Hiền</span>
            <div class="btn-group">
                <button id="uv3-y" class="opt-btn active-y" onclick="select('uv3','Đồng ý')">Đồng ý</button>
                <button id="uv3-n" class="opt-btn" onclick="select('uv3','Không')">Không</button>
            </div>
        </div>

        <button id="btn-save" onclick="submitToGoogle()">LƯU PHIẾU BẦU</button>
    </div>
</div>

<script>
    // --- CẤU HÌNH ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhb-zc0UHw82Tayt-CpxyU69oUykvlopc8_7jrwcbY5nD9mzpDJIIrFQSndy1BCoMDoQ/exec";
    
    let formData = { 
        qr: "", 
        uv1: "Đồng ý", 
        uv2: "Đồng ý", 
        uv3: "Đồng ý" 
    };

    let html5QrCode;

    async function startCamera() {
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (text) => {
                formData.qr = text;
                const status = document.getElementById('qr-status');
                status.innerText = "✅ MÃ PHIẾU: " + text;
                status.style.color = "#2e7d32";
                if (navigator.vibrate) navigator.vibrate(50);
            }
        );
        document.getElementById('btn-scan').style.display = 'none';
    }

    function select(uv, val) {
        formData[uv] = val;
        // Cập nhật giao diện nút bấm
        const isYes = (val === 'Đồng ý');
        document.getElementById(uv + '-y').className = isYes ? 'opt-btn active-y' : 'opt-btn';
        document.getElementById(uv + '-n').className = isYes ? 'opt-btn' : 'opt-btn active-n';
    }

    function submitToGoogle() {
        if(!formData.qr) return alert("Bạn chưa quét mã QR trên phiếu!");
        
        const btn = document.getElementById('btn-save');
        btn.innerText = "⏳ ĐANG LƯU...";
        btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", // Quan trọng để tránh lỗi bảo mật trình duyệt
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert("Đã lưu dữ liệu thành công!");
            // Reset mã QR để quét phiếu tiếp theo
            formData.qr = "";
            document.getElementById('qr-status').innerText = "Sẵn sàng quét phiếu mới...";
            document.getElementById('qr-status').style.color = "#d32f2f";
            btn.innerText = "LƯU PHIẾU BẦU";
            btn.disabled = false;
        })
        .catch(err => {
            alert("Lỗi: " + err);
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
