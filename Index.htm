<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner API</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #reader { width: 300px; margin: auto; }
        .status { color: blue; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="text-align:center">QR Scanner to Sheets</h2>
    <div id="reader"></div>
    <p id="msg" class="status">Chờ quét...</p>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwTWUsL7wU1tu2UFF5oond6-MHZvQ29dqj4F_ncggQJ5qYi0OYtdOf3Z1iMHdK-AMM1DQ/exec";

        function onScanSuccess(decodedText) {
            document.getElementById('msg').innerText = "Đang gửi dữ liệu...";
            
            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ qrCode: decodedText })
            })
            .then(res => {
                document.getElementById('msg').innerText = "Thành công: " + decodedText;
            })
            .catch(err => {
                document.getElementById('msg').innerText = "Lỗi gửi dữ liệu!";
            });
        }

        let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render(onScanSuccess);
    </script>
</body>
</html>
