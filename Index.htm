<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ thống Biểu quyết ĐH</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 8px;
            color: #333;
        }
        .container { max-width: 500px; margin: auto; }
        .card { 
            background: white; 
            padding: 12px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            margin-bottom: 10px; 
        }
        
        /* === THU NHỎ FRAME CAMERA (Ô ĐEN) === */
        #reader { 
            width: 55%; /* Thu nhỏ lại còn khoảng 1/2 chiều rộng card */
            max-width: 180px; 
            margin: 5px auto; 
            border-radius: 10px; 
            overflow: hidden; 
            background: #000;
            border: 2px solid #1a73e8;
            aspect-ratio: 1.0;
        }

        .qr-status { 
            display: block; 
            margin: 8px 0; 
            font-weight: bold; 
            color: #d32f2f;
            text-align: center;
            font-size: 0.95rem;
        }

        /* Tối ưu danh sách ứng viên để tiết kiệm diện tích */
        .candidate-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .candidate-item:last-child { border-bottom: none; }
        .name { font-weight: bold; display: block; margin-bottom: 6px; color: #333; font-size: 0.95rem; }
        
        .btn-group { display: flex; gap: 6px; }
        .opt-btn { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            background: #fff; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 0.9rem;
        }
        .opt-btn.active-y { background: #2e7d32 !important; color: white !important; border-color: #2e7d32; }
        .opt-btn.active-n { background: #c62828 !important; color: white !important; border-color: #c62828; }
        
        #btn-scan { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-bottom: 5px; 
            cursor: pointer;
        }
        #btn-save { 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            margin-top: 10px; 
            cursor: pointer;
        }
        #btn-save:disabled { background: #ccc; }

        .footer-note { font-size: 0.75rem; color: #777; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="text-align: center;">
        <button id="btn-scan" onclick="startCamera()">BẬT CAMERA QUÉT MÃ</button>
        <div id="reader"></div>
        <span id="qr-status" class="qr-status">Chờ quét mã QR...</span>
    </div>

    <div class="card">
        <div class="candidate-item">
            <span class="name">1. Trần Thị Hải Vân</span>
            <div class="btn-group">
                <button id="uv1-y" class="opt-btn active-y" onclick="selectChoice('uv1','Đồng ý')">Đồng ý</button>
                <button id="uv1-n" class="opt-btn" onclick="selectChoice('uv1','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">2. Nguyễn Văn Minh</span>
            <div class="btn-group">
                <button id="uv2-y" class="opt-btn active-y" onclick="selectChoice('uv2','Đồng ý')">Đồng ý</button>
                <button id="uv2-n" class="opt-btn" onclick="selectChoice('uv2','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">3. Nguyễn Thị Hải Hiền</span>
            <div class="btn-group">
                <button id="uv3-y" class="opt-btn active-y" onclick="selectChoice('uv3','Đồng ý')">Đồng ý</button>
                <button id="uv3-n" class="opt-btn" onclick="selectChoice('uv3','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <button id="btn-save" onclick="submitToGoogle()">LƯU PHIẾU BẦU</button>
        <p class="footer-note">* Quét mã QR trên phiếu trước khi bấm Lưu.</p>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhb-zc0UHw82Tayt-CpxyU69oUykvlopc8_7jrwcbY5nD9mzpDJIIrFQSndy1BCoMDoQ/exec";
    
    let formData = { qr: "", uv1: "Đồng ý", uv2: "Đồng ý", uv3: "Đồng ý" };
    let html5QrCode;

    async function startCamera() {
        const scanBtn = document.getElementById('btn-scan');
        scanBtn.innerText = "🔄 Đang tải...";
        
        try {
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { 
                    fps: 20, 
                    // === KHUNG NHẬN DIỆN TRẮNG TO HƠN ===
                    // Điều chỉnh tỷ lệ vùng quét chiếm ~85% ô đen
                    qrbox: (viewfinderWidth, viewfinderHeight) => {
                        let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                        let edgeSize = Math.floor(minEdge * 0.85); 
                        return { width: edgeSize, height: edgeSize };
                    }
                },
                (qrText) => {
                    if (formData.qr !== qrText) {
                        formData.qr = qrText;
                        const status = document.getElementById('qr-status');
                        status.innerText = "✅ ĐÃ QUÉT: " + qrText;
                        status.style.color = "#2e7d32";
                        if (navigator.vibrate) navigator.vibrate(100); 
                    }
                }
            );
            scanBtn.style.display = 'none';
        } catch (err) {
            alert("Lỗi Camera: " + err);
            scanBtn.innerText = "THỬ LẠI";
        }
    }

    function selectChoice(uv, val) {
        formData[uv] = val;
        const isYes = (val === 'Đồng ý');
        document.getElementById(uv + '-y').className = isYes ? 'opt-btn active-y' : 'opt-btn';
        document.getElementById(uv + '-n').className = isYes ? 'opt-btn' : 'opt-btn active-n';
    }

    function submitToGoogle() {
        if(!formData.qr) return alert("⚠️ Bạn chưa quét mã QR trên phiếu!");
        
        const btn = document.getElementById('btn-save');
        btn.innerText = "⏳ ĐANG LƯU...";
        btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert("🎉 Thành công!");
            formData.qr = "";
            document.getElementById('qr-status').innerText = "Chờ quét mã QR...";
            document.getElementById('qr-status').style.color = "#d32f2f";
            btn.innerText = "LƯU PHIẾU BẦU";
            btn.disabled = false;
        })
        .catch(err => {
            alert("Lỗi: " + err);
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
