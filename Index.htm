<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ thống Kiểm Biểu quyết</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 8px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .block-title { background: #e7f3ff; color: #1a73e8; padding: 8px; border-radius: 6px; font-weight: bold; margin: 15px 0 10px 0; text-align: center; border: 1px solid #1a73e8; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* QR Scanner */
        #reader { width: 100%; max-width: 250px; margin: 10px auto; border-radius: 10px; overflow: hidden; background: #000; border: 2px solid #1a73e8; aspect-ratio: 1; }
        .qr-status { display: block; margin: 10px 0; font-weight: bold; color: #d32f2f; text-align: center; }
        .blink { animation: blinker 0.6s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Candidate UI */
        .candidate-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .name { font-weight: bold; display: block; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 8px; }
        .opt-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-weight: bold; cursor: pointer; }
        .active-y { background: #2e7d32 !important; color: white !important; border-color: #2e7d32; }
        .active-n { background: #c62828 !important; color: white !important; border-color: #c62828; }

        .btn-main { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-save { background: #ccc; cursor: not-allowed; margin-top: 15px; }
        .btn-save.ready { background: #28a745 !important; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="card" style="width: 100%; max-width: 350px; text-align: center;">
        <h2 style="color: #1a73e8;">ĐĂNG NHẬP</h2>
        <input type="email" id="login-email" placeholder="Email của bạn">
        <input type="password" id="login-pass" placeholder="Mật khẩu">
        <button class="btn-main" onclick="checkLogin()" id="btn-login-submit">XÁC NHẬN</button>
        <p id="login-error" style="color: red; display: none; margin-top: 10px;">Sai thông tin đăng nhập!</p>
    </div>
</div>

<div class="container">
    <div class="card" style="text-align: center;">
        <p id="user-display" style="font-weight: bold; color: #555;"></p>
        <button id="btn-scan" class="btn-main" onclick="startCamera()">BẬT CAMERA QUÉT MÃ</button>
        <div id="reader"></div>
        <span id="qr-status" class="qr-status">Chờ quét mã QR...</span>
    </div>

    <div class="card">
        <div class="block-title">I. BẦU THÀNH VIÊN HĐQT</div>
        
        <div class="candidate-item">
            <span class="name">1. Nguyễn Thị Hải Hiền</span>
            <div class="btn-group">
                <button id="uv1-y" class="opt-btn active-y" onclick="selectChoice('uv1','Đồng ý')">Đồng ý</button>
                <button id="uv1-n" class="opt-btn" onclick="selectChoice('uv1','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">2. Nguyễn Văn Minh</span>
            <div class="btn-group">
                <button id="uv2-y" class="opt-btn active-y" onclick="selectChoice('uv2','Đồng ý')">Đồng ý</button>
                <button id="uv2-n" class="opt-btn" onclick="selectChoice('uv2','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">3. Trần Thị Hải Vân</span>
            <div class="btn-group">
                <button id="uv3-y" class="opt-btn active-y" onclick="selectChoice('uv3','Đồng ý')">Đồng ý</button>
                <button id="uv3-n" class="opt-btn" onclick="selectChoice('uv3','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="block-title">II. BẦU THÀNH VIÊN BKS</div>

        <div class="candidate-item">
            <span class="name">1. Trần Thị Thu Hà</span>
            <div class="btn-group">
                <button id="bks1-y" class="opt-btn active-y" onclick="selectChoice('bks1','Đồng ý')">Đồng ý</button>
                <button id="bks1-n" class="opt-btn" onclick="selectChoice('bks1','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">2. Trần Biên Thùy</span>
            <div class="btn-group">
                <button id="bks2-y" class="opt-btn active-y" onclick="selectChoice('bks2','Đồng ý')">Đồng ý</button>
                <button id="bks2-n" class="opt-btn" onclick="selectChoice('bks2','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <div class="candidate-item">
            <span class="name">3. Trần Thu Trang</span>
            <div class="btn-group">
                <button id="bks3-y" class="opt-btn active-y" onclick="selectChoice('bks3','Đồng ý')">Đồng ý</button>
                <button id="bks3-n" class="opt-btn" onclick="selectChoice('bks3','Không đồng ý')">Không đồng ý</button>
            </div>
        </div>

        <button id="btn-save" class="btn-main btn-save" disabled onclick="submitToGoogle()">LƯU PHIẾU BẦU</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4_yHxwnPq5LidBg85HoioKJ0fZJZ-fS79Eoq7smywXhglm_uFCmmnlR79tBKuFkstUA/exec";
    
    let currentUserEmail = "";
    // Cập nhật formData để nhận thêm 3 ứng viên BKS
    let formData = { 
        email: "", qr: "", 
        uv1: "Đồng ý", uv2: "Đồng ý", uv3: "Đồng ý",
        bks1: "Đồng ý", bks2: "Đồng ý", bks3: "Đồng ý" 
    };
    let html5QrCode;

    async function checkLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const btn = document.getElementById('btn-login-submit');
        const errorMsg = document.getElementById('login-error');
        if (!email || !pass) { alert("Vui lòng nhập đầy đủ!"); return; }
        btn.innerText = "⏳ ĐANG KIỂM TRA...";
        btn.disabled = true;
        try {
            const response = await fetch(`${SCRIPT_URL}?action=login&email=${email}&pass=${pass}`);
            const result = await response.json();
            if (result.status === "success") {
                currentUserEmail = email;
                document.getElementById('user-display').innerText = "Người dùng: " + email;
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                errorMsg.style.display = 'block';
                btn.innerText = "XÁC NHẬN";
                btn.disabled = false;
            }
        } catch (err) {
            alert("Lỗi kết nối máy chủ Google!");
            btn.disabled = false;
            btn.innerText = "XÁC NHẬN";
        }
    }

    async function startCamera() {
        const scanBtn = document.getElementById('btn-scan');
        scanBtn.innerText = "🔄 Đang khởi động...";
        try {
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: 200 },
                (qrText) => {
                    if (formData.qr !== qrText) {
                        formData.qr = qrText;
                        const status = document.getElementById('qr-status');
                        const saveBtn = document.getElementById('btn-save');
                        status.innerText = "✅ ĐÃ QUÉT: " + qrText;
                        status.style.color = "#2e7d32";
                        status.classList.add("blink");
                        saveBtn.disabled = false;
                        saveBtn.classList.add("ready");
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                }
            );
            scanBtn.style.display = 'none';
        } catch (err) {
            alert("Lỗi Camera: " + err);
            scanBtn.innerText = "THỬ LẠI";
        }
    }

    function selectChoice(id, val) {
        formData[id] = val;
        const isYes = (val === 'Đồng ý');
        document.getElementById(id + '-y').className = isYes ? 'opt-btn active-y' : 'opt-btn';
        document.getElementById(id + '-n').className = isYes ? 'opt-btn' : 'opt-btn active-n';
    }

    function resetChoices() {
        // Reset tất cả các lựa chọn về 'Đồng ý'
        ['uv1', 'uv2', 'uv3', 'bks1', 'bks2', 'bks3'].forEach(id => selectChoice(id, 'Đồng ý'));
    }

    function submitToGoogle() {
        const btn = document.getElementById('btn-save');
        const status = document.getElementById('qr-status');
        if(btn.disabled) return;
        formData.email = currentUserEmail;
        btn.innerText = "⏳ ĐANG LƯU...";
        btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(formData),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(() => {
            alert("🎉 Đã lưu phiếu thành công!");
            formData.qr = "";
            status.innerText = "Chờ quét mã QR...";
            status.style.color = "#d32f2f";
            status.classList.remove("blink");
            btn.innerText = "LƯU PHIẾU BẦU";
            btn.classList.remove("ready");
            btn.disabled = true;
            resetChoices();
        })
        .catch(err => {
            alert("Lỗi lưu phiếu: " + err);
            btn.disabled = false;
            btn.innerText = "LƯU PHIẾU BẦU";
        });
    }
</script>
</body>
</html>
