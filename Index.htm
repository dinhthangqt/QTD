<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quét Phiếu ĐH - GitHub Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 15px; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #1a73e8; }
        #display-qr { color: #d32f2f; font-weight: bold; display: block; margin: 15px 0; }
        .btn-group { display: flex; gap: 10px; }
        .opt { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #ddd; background: white; font-weight: bold; }
        .active { background: #2e7d32 !important; color: white !important; }
        #submit { background: #28a745; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <button id="btn-start" style="padding:15px; width:100%;" onclick="startCam()">BẬT CAMERA</button>
    <div id="reader"></div>
    <span id="display-qr">Chờ quét mã...</span>
</div>

<div class="box">
    <div style="text-align:left; margin-bottom:10px;"><b>1. Trần Thị Hải Vân</b></div>
    <div class="btn-group">
        <button id="btn-y" class="opt active" onclick="setChoice('Đồng ý')">Đồng ý</button>
        <button id="btn-n" class="opt" onclick="setChoice('Không')">Không</button>
    </div>
    <button id="submit" onclick="sendToGoogle()">LƯU PHIẾU BẦU</button>
</div>

<script>
    // THAY LINK WEB APP CỦA BẠN VÀO ĐÂY
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLa835py27Y2QRFraUc9msX0Xd_TGIT6lkq-7SFE0b-GZ-9vzLJt-57Jcb6_IhRHtW8Q/exec";
    
    let vData = { qr: "", uv1: "Đồng ý" };
    let scanner;

    async function startCam() {
        scanner = new Html5Qrcode("reader");
        await scanner.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (text) => {
                vData.qr = text;
                document.getElementById('display-qr').innerText = "✅ ĐÃ NHẬN: " + text;
                document.getElementById('display-qr').style.color = "green";
            }
        );
        document.getElementById('btn-start').style.display = 'none';
    }

    function setChoice(val) {
        vData.uv1 = val;
        document.getElementById('btn-y').classList.toggle('active', val === 'Đồng ý');
        document.getElementById('btn-n').classList.toggle('active', val === 'Không');
    }

    function sendToGoogle() {
        if(!vData.qr) return alert("Chưa quét mã!");
        const btn = document.getElementById('submit');
        btn.innerText = "⏳ ĐANG LƯU...";
        btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(vData)
        })
        .then(() => {
            alert("Lưu thành công!");
            vData.qr = "";
            document.getElementById('display-qr').innerText = "Chờ quét tiếp...";
            btn.innerText = "LƯU PHIẾU BẦU";
            btn.disabled = false;
        })
        .catch(err => {
            alert("Lỗi kết nối: " + err);
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
